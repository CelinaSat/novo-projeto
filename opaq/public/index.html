<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cloud Health Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Dashboard</h1>
    </header>

    <main id="monitor-container">
        <section id="card-cpu" class="card">
            <h2>CPU</h2>
            <p><span class="valor">0</span>%</p>
        </section>

        <section id="card-ram" class="card">
            <h2>RAM</h2>
            <p><span class="valor">0</span> GB</p>
        </section>

        <section id="card-temp" class="card">
            <h2>Temperatura</h2>
            <p><span class="valor">0</span>°C</p>
        </section>
    </main>


    <script src="script.js"></script>
</body>
</html>
